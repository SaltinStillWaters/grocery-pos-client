name: CI Pipeline

# 1. When should this run?
on:
  push:
    branches: [ "master", "dev" ]
  pull_request:

# 2. What should it do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step A: Clone your code into the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use the Node version your project requires
          cache: 'npm'       # Speeds up future runs by caching dependencies

      # Step C: Install Dependencies (npm ci is safer than npm install for CI)
      - name: Install Dependencies
        run: npm ci

      # Step D: Run your linter (Optional, but highly recommended)
      - name: Lint Code
        run: npm run lint

      # Step E: Build the app to ensure no TypeScript/Zod errors
      - name: Build Application
        run: npm run build
        env:
          # CRITICAL: Because of our strict Zod schema, Vite will refuse 
          # to build if these are missing. We provide dummy variables just for CI.
          VITE_NODE_ENV: prod
          VITE_API_URL: https://api.ci-test.com
          VITE_DOMAIN: ci-test.com
          VITE_API_TIMEOUT: 5000